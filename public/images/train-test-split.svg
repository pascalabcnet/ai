<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title { font: 700 56px Arial, sans-serif; fill: #111827; }
      .code { font: 26px Consolas, monospace; fill: #111827; }
      .kw { fill: #6d28d9; font-weight: 700; }
      .num { fill: #2563eb; font-weight: 700; }
      .h1 { font: 700 38px Arial, sans-serif; fill: #111827; }
      .hblue { font: 700 32px Arial, sans-serif; fill: #2563eb; }
      .horange { font: 700 32px Arial, sans-serif; fill: #f04b23; }
      .head { font: 700 22px Arial, sans-serif; fill: #111827; }
      .cell { font: 24px Arial, sans-serif; fill: #111827; }
      .note { font: 24px Arial, sans-serif; fill: #111827; }
      .blue { fill: #2563eb; }
      .orange { fill: #f04b23; }
      .line { stroke: #b7beca; stroke-width: 1.2; }
      .box { fill: #fff; stroke: #111827; stroke-width: 2; }
      .bluebox { fill: #fff; stroke: #2563eb; stroke-width: 2; }
      .orangebox { fill: #fff; stroke: #f04b23; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L14,5 L0,10 Z" fill="#374151"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="800" y="70" text-anchor="middle" class="title">TrainTestSplit</text>

  <rect x="65" y="95" width="1470" height="66" rx="8" class="box"/>
  <text x="100" y="137" class="code"><tspan class="kw">var</tspan> (Xtrain, Xtest, ytrain, ytest) := Validation.TrainTestSplit(X, y, testRatio := <tspan class="num">0.25</tspan>, seed := <tspan class="num">42</tspan>);</text>

  <text x="260" y="240" text-anchor="middle" class="h1">X</text>
  <text x="530" y="240" text-anchor="middle" class="h1">y</text>

  <rect x="75" y="270" width="330" height="520" rx="8" class="box"/>
  <line x1="75" y1="320" x2="405" y2="320" class="line"/>
  <line x1="230" y1="270" x2="230" y2="790" class="line"/>
  <text x="152" y="304" text-anchor="middle" class="head">Вес</text>
  <text x="318" y="304" text-anchor="middle" class="head">ВысотаВХолке</text>

  <g class="cell" text-anchor="middle">
    <text x="152" y="365">20</text><text x="318" y="365">33</text>
    <text x="152" y="420">22</text><text x="318" y="420">34</text>
    <text x="152" y="475">24</text><text x="318" y="475">35</text>
    <text x="152" y="530">25</text><text x="318" y="530">36</text>
    <text x="152" y="585">...</text><text x="318" y="585">...</text>
    <text x="152" y="640">14</text><text x="318" y="640">39</text>
    <text x="152" y="695">15</text><text x="318" y="695">40</text>
    <text x="152" y="750">16</text><text x="318" y="750">41</text>
  </g>
  <text x="240" y="835" text-anchor="middle" class="note">16 объектов</text>

  <rect x="450" y="270" width="155" height="520" rx="8" class="box"/>
  <line x1="450" y1="320" x2="605" y2="320" class="line"/>
  <text x="528" y="304" text-anchor="middle" class="head">Порода</text>
  <g class="cell" text-anchor="middle">
    <text x="528" y="365">бульдог</text>
    <text x="528" y="420">бульдог</text>
    <text x="528" y="475">бульдог</text>
    <text x="528" y="530">бульдог</text>
