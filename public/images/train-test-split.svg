    <text x="528" y="695">спаниель</text>
    <text x="528" y="750">спаниель</text>
  </g>

  <line x1="660" y1="520" x2="770" y2="520" stroke="#374151" stroke-width="18" marker-end="url(#arrow)"/>

  <text x="980" y="240" text-anchor="middle" class="hblue">Xtrain</text>
  <rect x="805" y="270" width="360" height="300" rx="8" class="bluebox"/>
  <line x1="805" y1="320" x2="1165" y2="320" stroke="#2563eb" stroke-width="1.2"/>
  <line x1="970" y1="270" x2="970" y2="570" stroke="#2563eb" stroke-width="1.2"/>
  <text x="887" y="304" text-anchor="middle" class="head blue">Вес</text>
  <text x="1070" y="304" text-anchor="middle" class="head blue">ВысотаВХолке</text>
  <g class="cell" text-anchor="middle">
    <text x="887" y="360">22</text><text x="1070" y="360">34</text>
    <text x="887" y="410">21</text><text x="1070" y="410">35</text>
    <text x="887" y="460">20</text><text x="1070" y="460">36</text>
    <text x="887" y="510">...</text><text x="1070" y="510">...</text>
    <text x="887" y="550">15</text><text x="1070" y="550">38</text>
  </g>
  <text x="985" y="605" text-anchor="middle" class="note blue">12 объектов</text>

  <text x="1355" y="240" text-anchor="middle" class="hblue">ytrain</text>
  <rect x="1260" y="270" width="210" height="300" rx="8" class="bluebox"/>
  <line x1="1260" y1="320" x2="1470" y2="320" stroke="#2563eb" stroke-width="1.2"/>
  <text x="1365" y="304" text-anchor="middle" class="head blue">Порода</text>
  <g class="cell" text-anchor="middle">
    <text x="1365" y="360">бульдог</text>
    <text x="1365" y="410">бульдог</text>
    <text x="1365" y="460">бульдог</text>
    <text x="1365" y="510">...</text>
    <text x="1365" y="550">спаниель</text>
  </g>

  <text x="980" y="660" text-anchor="middle" class="horange">Xtest</text>
  <rect x="805" y="690" width="360" height="180" rx="8" class="orangebox"/>
  <line x1="805" y1="735" x2="1165" y2="735" stroke="#f04b23" stroke-width="1.2"/>
  <line x1="970" y1="690" x2="970" y2="870" stroke="#f04b23" stroke-width="1.2"/>
  <text x="887" y="720" text-anchor="middle" class="head orange">Вес</text>
  <text x="1070" y="720" text-anchor="middle" class="head orange">ВысотаВХолке</text>
  <g class="cell" text-anchor="middle">
    <text x="887" y="760">24</text><text x="1070" y="760">35</text>
    <text x="887" y="795">26</text><text x="1070" y="795">34</text>
    <text x="887" y="830">19</text><text x="1070" y="830">40</text>
    <text x="887" y="865">18</text><text x="1070" y="865">42</text>
  </g>
  <text x="985" y="895" text-anchor="middle" class="note orange">4 объекта</text>

  <text x="1355" y="660" text-anchor="middle" class="horange">ytest</text>
  <rect x="1260" y="690" width="210" height="180" rx="8" class="orangebox"/>
  <line x1="1260" y1="735" x2="1470" y2="735" stroke="#f04b23" stroke-width="1.2"/>
  <text x="1365" y="720" text-anchor="middle" class="head orange">Порода</text>
  <g class="cell" text-anchor="middle">
    <text x="1365" y="760">бульдог</text>
    <text x="1365" y="795">бульдог</text>
    <text x="1365" y="830">спаниель</text>
    <text x="1365" y="865">спаниель</text>
